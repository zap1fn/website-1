<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="levels_title">10 Coding-Levels</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Press+Start+2P&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="header-inner">
            <a href="index.html" class="logo pixel" data-i18n="logo">Code4Beginners</a>

            <div class="header-center">
                <div class="lang-switcher">
                    <button class="lang-btn active" data-lang="de" title="Deutsch">
                        <img src="https://flagcdn.com/32x24/de.png" alt="DE">
                    </button>
                    <button class="lang-btn" data-lang="en" title="English">
                        <img src="https://flagcdn.com/32x24/gb.png" alt="GB">
                    </button>
                    <button class="lang-btn" data-lang="es" title="Español">
                        <img src="https://flagcdn.com/32x24/es.png" alt="ES">
                    </button>
                    <button class="lang-btn" data-lang="fr" title="Français">
                        <img src="https://flagcdn.com/32x24/fr.png" alt="FR">
                    </button>
                    <button class="lang-btn" data-lang="it" title="Italiano">
                        <img src="https://flagcdn.com/32x24/it.png" alt="IT">
                    </button>
                </div>

                <nav class="nav">
                    <a href="index.html" data-i18n="nav_home">Start</a>
                    <a href="levels.html" class="active" data-i18n="nav_levels">10 Levels</a>
                    <a href="html-basics.html" data-i18n="nav_html">HTML Grundlagen</a>
                    <a href="css-basics.html" data-i18n="nav_css">CSS Grundlagen</a>
                </nav>
            </div>

            <button id="darkModeToggle" class="theme-btn" aria-label="Dark Mode umschalten">
                <span class="icon-sun">☀️</span>
                <span class="icon-moon">🌙</span>
            </button>

            <button class="menu-btn" aria-label="Menü">MENU</button>
        </div>
    </header>

    <section class="hero" style="padding:60px 20px 70px;">
        <div class="hero-grid-overlay" aria-hidden="true"></div>
        <div class="hero-content">
            <h1 class="h-display" data-i18n="levels_title">10 Coding-Levels</h1>
            <p class="hero-text" data-i18n="levels_sub">Lerne Schritt für Schritt HTML & CSS</p>
        </div>
    </section>

    <section>
        <div class="container" style="max-width: 800px;">
            <!-- Fortschrittsbalken -->
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <!-- Level Auswahl -->
            <div class="levels-nav" id="levelsNav"></div>

            <!-- Level Karte -->
            <div class="level-card" id="levelCard">
                <div id="levelContent"></div>

                <!-- Ergebnis -->
                <div class="level-result" id="levelResult"></div>

                <!-- Hinweis -->
                <div class="level-hint" id="levelHint"></div>

                <!-- Aktionen -->
                <div class="level-actions">
                    <button class="btn-primary" id="checkBtn" data-i18n="level_check">Prüfen</button>
                    <button class="btn-ghost" id="hintBtn">💡 Hinweis <span class="hint-counter">1/3</span></button>
                    <button class="btn-ghost" id="explainBtn" data-i18n="level_explain">🤔 Warum ist das so?</button>
                    <button class="btn-ghost" id="solutionBtn" data-i18n="level_solution">Lösung zeigen</button>
                    <button class="btn-ghost" id="resetBtn" data-i18n="level_reset">Zurücksetzen</button>
                </div>

                <!-- Navigation -->
                <div class="level-nav-buttons">
                    <button class="btn-ghost" id="prevBtn" data-i18n="level_prev">← Vorheriges Level</button>
                    <button class="btn-primary" id="nextBtn" data-i18n="level_next">Nächstes Level →</button>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <p class="footer-text" data-i18n="footer_text">© 2026 Code4Beginners – Aus Liebe zum Lernen <span class="text-cyan">💜</span></p>
    </footer>

    <script src="script.js"></script>
    <script>
        // ===== LEVEL DATEN (10 Levels von leicht bis sehr schwer) =====
        const levels = [
            {
                title: "Deine erste Überschrift", difficulty: "Sehr leicht", difficultyClass: "easy",
                task: "Schreibe eine Überschrift mit <code>&lt;h1&gt;</code> die <strong>Hallo Welt!</strong> anzeigt.",
                hints: [
                    "HTML-Tags haben immer einen öffnenden <code>&lt;tag&gt;</code> und schließenden <code>&lt;/tag&gt;</code> Teil.",
                    "Die größte Überschrift ist <code>&lt;h1&gt;</code>. Es gibt auch <code>h2</code> bis <code>h6</code>.",
                    "Schreibe: <code>&lt;h1&gt;Hallo Welt!&lt;/h1&gt;</code>"
                ],
                explanation: "Das <code>&lt;h1&gt;</code> ist die wichtigste Überschrift auf einer Seite. Suchmaschinen wie Google achten besonders darauf. Es gibt nur EINE <code>h1</code> pro Seite – das ist die Hauptüberschrift.",
                check: (c) => c.includes('<h1>') && c.includes('</h1>') && c.includes('Hallo'),
                solution: '<h1>Hallo Welt!</h1>'
            },
            {
                title: "Ein Absatz", difficulty: "Sehr leicht", difficultyClass: "easy",
                task: "Erstelle einen Absatz mit <code>&lt;p&gt;</code> und schreibe: <strong>Das ist mein erster Absatz.</strong>",
                hints: [
                    "Ein Absatz wird mit <code>&lt;p&gt;</code> geöffnet und <code>&lt;/p&gt;</code> geschlossen.",
                    "Alles zwischen <code>&lt;p&gt;</code> und <code>&lt;/p&gt;</code> wird als Textabsatz dargestellt.",
                    "Schreibe: <code>&lt;p&gt;Das ist mein erster Absatz.&lt;/p&gt;</code>"
                ],
                explanation: "Der <code>&lt;p&gt;</code>-Tag steht für 'Paragraph'. Der Browser zeigt den Text als eigenen Block mit etwas Abstand nach oben und unten an. Perfekt für längere Texte!",
                check: (c) => c.includes('<p>') && c.includes('</p>') && c.includes('Absatz'),
                solution: '<p>Das ist mein erster Absatz.</p>'
            },
            {
                title: "Ein Link", difficulty: "Leicht", difficultyClass: "easy",
                task: "Erstelle einen Link zu <strong>https://google.de</strong> mit dem Text <strong>Zu Google</strong>.",
                hints: [
                    "Ein Link braucht ein <code>href</code>-Attribut für das Ziel.",
                    "Der Aufbau: <code>&lt;a href=\"ZIEL\"&gt;Angezeigter Text&lt;/a&gt;</code>",
                    "Schreibe: <code>&lt;a href=\"https://google.de\"&gt;Zu Google&lt;/a&gt;</code>"
                ],
                explanation: "Das <code>&lt;a&gt;</code>-Tag steht für 'Anchor' (Anker). Das <code>href</code>-Attribut bestimmt, wohin der Link führt. Ohne <code>href</code> ist es kein klickbarer Link!",
                check: (c) => c.includes('<a') && c.includes('href') && c.includes('</a>') && c.includes('Google'),
                solution: '<a href="https://google.de">Zu Google</a>'
            },
            {
                title: "Ein Bild", difficulty: "Leicht", difficultyClass: "easy",
                task: "Füge ein Bild ein mit <code>&lt;img&gt;</code>. Nutze als Quelle: <strong>https://picsum.photos/200</strong> und als Alternativtext <strong>Zufallsbild</strong>.",
                hints: [
                    "Das <code>img</code>-Tag ist selbstschließend – es braucht kein <code>&lt;/img&gt;</code>.",
                    "Es braucht zwei wichtige Attribute: <code>src</code> (Quelle) und <code>alt</code> (Alternativtext).",
                    "Schreibe: <code>&lt;img src=\"https://picsum.photos/200\" alt=\"Zufallsbild\"&gt;</code>"
                ],
                explanation: "Der <code>alt</code>-Text ist super wichtig! Wenn das Bild nicht lädt, zeigt der Browser diesen Text an. Auch blinde Menschen nutzen ihn über Vorlese-Programme. Immer einen guten <code>alt</code>-Text angeben!",
                check: (c) => c.includes('<img') && c.includes('src=') && c.includes('alt='),
                solution: '<img src="https://picsum.photos/200" alt="Zufallsbild">'
            },
            {
                title: "Eine Liste", difficulty: "Mittel", difficultyClass: "medium",
                task: "Erstelle eine ungeordnete Liste mit <strong>3 Punkten</strong>: HTML, CSS, JavaScript",
                hints: [
                    "Eine Liste braucht <code>&lt;ul&gt;</code> (unordered list) und <code>&lt;li&gt;</code> (list item).",
                    "Jeder Punkt ist ein <code>&lt;li&gt;</code> innerhalb von <code>&lt;ul&gt;</code>.",
                    "Schreibe: <code>&lt;ul&gt;&lt;li&gt;HTML&lt;/li&gt;&lt;li&gt;CSS&lt;/li&gt;&lt;li&gt;JavaScript&lt;/li&gt;&lt;/ul&gt;</code>"
                ],
                explanation: "Mit <code>&lt;ul&gt;</code> erstellst du eine Liste mit Aufzählungspunkten. Es gibt auch <code>&lt;ol&gt;</code> für nummerierte Listen. Listen sind perfekt für Aufzählungen, Menüs und Navigationen.",
                check: (c) => c.includes('<ul>') && c.includes('<li>') && (c.match(/<li>/g) || []).length >= 2,
                solution: '<ul>\n    <li>HTML</li>\n    <li>CSS</li>\n    <li>JavaScript</li>\n</ul>'
            },
            {
                title: "Fett & Kursiv", difficulty: "Mittel", difficultyClass: "medium",
                task: "Schreibe einen Absatz: <strong>Das ist wichtig</strong> und <em>das ist betont</em>.",
                hints: [
                    "Nutze <code>&lt;strong&gt;</code> für fette Schrift und <code>&lt;em&gt;</code> für kursive Schrift.",
                    "Beide Tags können innerhalb eines <code>&lt;p&gt;</code> verwendet werden.",
                    "Schreibe: <code>&lt;p&gt;&lt;strong&gt;Das ist wichtig&lt;/strong&gt; und &lt;em&gt;das ist betont&lt;/em&gt;.&lt;/p&gt;</code>"
                ],
                explanation: "Früher nutzte man <code>&lt;b&gt;</code> (bold) und <code>&lt;i&gt;</code> (italic). Heute nimmt man <code>&lt;strong&gt;</code> und <code>&lt;em&gt;</code>, weil sie nicht nur das Aussehen ändern, sondern auch die Bedeutung betonen – wichtig für Screenreader!",
                check: (c) => c.includes('<strong>') && c.includes('</strong>') && c.includes('<em>') && c.includes('</em>'),
                solution: '<p><strong>Das ist wichtig</strong> und <em>das ist betont</em>.</p>'
            },
            {
                title: "Eine bunte Box", difficulty: "Mittel", difficultyClass: "medium",
                task: "Erstelle einen <code>&lt;div&gt;</code> mit <strong>lila Hintergrund</strong>, <strong>weißer Schrift</strong>, <strong>20px Innenabstand</strong> und dem Text: Hallo, ich bin eine Box!",
                hints: [
                    "Nutze das <code>style</code>-Attribut für CSS direkt im HTML-Tag.",
                    "Du brauchst: <code>background</code>, <code>color</code> und <code>padding</code>.",
                    "Schreibe: <code>&lt;div style=\"background:#6C63FF;color:white;padding:20px;\"&gt;Hallo, ich bin eine Box!&lt;/div&gt;"
                ],
                explanation: "Der <code>&lt;div&gt;</code> ist ein universeller Container (eine Box). Mit CSS im <code>style</code>-Attribut bestimmst du das Aussehen. <code>padding</code> ist der Abstand INNERHALB der Box, <code>margin</code> wäre der Abstand AUSSERHALB.",
                check: (c) => c.includes('<div') && c.includes('</div>') && c.includes('background'),
                solution: '<div style="background:#6C63FF;color:white;padding:20px;border-radius:10px;">Hallo, ich bin eine Box!</div>'
            },
            {
                title: "Deine Mini-Webseite", difficulty: "Schwer", difficultyClass: "hard",
                task: "Baue eine Mini-Seite mit: einer <strong>Überschrift</strong>, einem <strong>Absatz</strong>, einem <strong>Bild</strong> und einem <strong>Link</strong>.",
                hints: [
                    "Kombiniere einfach die Tags aus den vorherigen Levels.",
                    "Du brauchst: <code>h1</code>, <code>p</code>, <code>img</code> und <code>a</code>.",
                    "Schreibe alle vier Tags nacheinander – jeder in einer eigenen Zeile."
                ],
                explanation: "Echte Websites bestehen aus vielen solcher Kombinationen! HTML ist wie Legosteine: Jeder Tag ist ein Stein, und du setzt sie zusammen. Mit diesen 4 Tags kannst du schon einfache Webseiten bauen.",
                check: (c) => c.includes('<h1') && c.includes('<p') && c.includes('<img') && c.includes('<a'),
                solution: '<h1>Meine erste Seite</h1>\n<p>Das ist meine erste richtige Webseite.</p>\n<img src="https://picsum.photos/200" alt="Bild">\n<a href="https://google.de">Besuche Google</a>'
            },
            {
                title: "Eine Tabelle", difficulty: "Schwer", difficultyClass: "hard",
                task: "Erstelle eine Tabelle mit 2 Spalten (Name, Alter) und 2 Zeilen (Max 25, Lisa 30).",
                hints: [
                    "Eine Tabelle braucht: <code>&lt;table&gt;</code>, <code>&lt;tr&gt;</code> (Zeile), <code>&lt;th&gt;</code> (Kopf) und <code>&lt;td&gt;</code> (Daten).",
                    "Jede <code>&lt;tr&gt;</code> ist eine Zeile. Die erste Zeile enthält <code>&lt;th&gt;</code>, die anderen <code>&lt;td&gt;</code>.",
                    "Baue: table → tr mit 2x th → tr mit 2x td → tr mit 2x td"
                ],
                explanation: "Tabellen waren früher das wichtigste Werkzeug für Layouts. Heute nutzt man sie nur noch für echte Tabellendaten. Die Struktur ist: Zeilen (&lt;tr&gt;) enthalten Zellen (&lt;th&gt; für Kopf, &lt;td&gt; für Daten).",
                check: (c) => c.includes('<table>') && c.includes('<tr>') && (c.includes('<th>') || c.includes('<td>')),
                solution: '<table border="1" style="border-collapse:collapse;width:100%;">\n    <tr>\n        <th>Name</th>\n        <th>Alter</th>\n    </tr>\n    <tr>\n        <td>Max</td>\n        <td>25</td>\n    </tr>\n    <tr>\n        <td>Lisa</td>\n        <td>30</td>\n    </tr>\n</table>'
            },
            {
                title: "Ein Kontaktformular", difficulty: "Sehr schwer", difficultyClass: "hard",
                task: "Baue ein Formular mit einem <strong>Textfeld</strong> (Name), einer <strong>E-Mail-Eingabe</strong> und einem <strong>Senden-Button</strong>.",
                hints: [
                    "Ein Formular braucht <code>&lt;form&gt;</code>, <code>&lt;input&gt;</code> und <code>&lt;button&gt;</code>.",
                    "Für E-Mail nutze <code>type=\"email\"</code>. Der Button bekommt <code>type=\"submit\"</code>.",
                    "Baue: form → input (Name) → input (Email) → button (Senden)"
                ],
                explanation: "Formulare sind das Herz der Interaktion im Web! <code>&lt;input&gt;</code> erzeugt Eingabefelder. Der <code>type</code> bestimmt die Art (Text, Email, Passwort...). Der <code>&lt;button&gt;</code> sendet die Daten ab. Ohne JavaScript passiert hier noch nichts – aber das kommt später!",
                check: (c) => c.includes('<form') && c.includes('<input') && c.includes('<button'),
                solution: '<form style="display:flex;flex-direction:column;gap:10px;max-width:300px;">\n    <input placeholder="Dein Name">\n    <input type="email" placeholder="Deine E-Mail">\n    <button style="background:#6C63FF;color:white;border:none;padding:10px;border-radius:5px;">Senden</button>\n</form>'
            }
        ];

        // ===== LEVEL-LOGIK =====
        let currentLevel = 0;
        let completedLevels = JSON.parse(localStorage.getItem('completedLevels') || '[]');
        let hintLevel = 0;
        let solutionVisible = false;
        let explanationVisible = false;

        function saveProgress() {
            localStorage.setItem('completedLevels', JSON.stringify(completedLevels));
        }

        function renderLevelNav() {
            const nav = document.getElementById('levelsNav');
            nav.innerHTML = '';
            levels.forEach((level, i) => {
                const btn = document.createElement('button');
                btn.className = 'level-tab';
                if (i === currentLevel) btn.classList.add('active');
                if (completedLevels.includes(i)) btn.classList.add('done');
                btn.textContent = i + 1;
                btn.onclick = () => switchLevel(i);
                nav.appendChild(btn);
            });
        }

        function switchLevel(index) {
            currentLevel = index;
            hintLevel = 0;
            solutionVisible = false;
            explanationVisible = false;
            document.getElementById('levelHint').classList.remove('show');
            document.getElementById('levelExplain').classList.remove('show');
            document.getElementById('levelResult').style.display = 'none';
            renderLevel();
            renderLevelNav();
            updateProgress();
        }

        function renderLevel() {
            const level = levels[currentLevel];
            const container = document.getElementById('levelContent');
            const hintTexts = [];
            for (let i = 0; i < hintLevel; i++) {
                const cls = i === 0 ? 'hint-1' : i === 1 ? 'hint-2' : 'hint-3';
                hintTexts.push(`<div class="level-hint show ${cls}">🔹 ${level.hints[i]}</div>`);
            }

            container.innerHTML = `
                <div class="level-difficulty ${level.difficultyClass}">${level.difficulty}</div>
                <h3>Level ${currentLevel + 1}: ${level.title}</h3>
                <div class="level-desc">${level.task}</div>
                <div class="editor-row">
                    <div class="editor-area">
                        <label data-i18n="level_task_label">Dein Code:</label>
                        <textarea id="codeEditor">${solutionVisible ? level.solution : ''}</textarea>
                    </div>
                    <div class="preview-area">
                        <label data-i18n="level_preview_label">Vorschau:</label>
                        <iframe class="preview-frame" id="previewFrame" sandbox="allow-scripts"></iframe>
                    </div>
                </div>
                ${hintTexts.join('')}
                <div class="level-explain" id="levelExplain">${explanationVisible ? '<strong>🤔 Warum?</strong> ' + level.explanation : ''}</div>
            `;

            const editor = document.getElementById('codeEditor');
            editor.addEventListener('input', updatePreview);
            updatePreview();

            document.getElementById('checkBtn').onclick = checkLevel;
            document.getElementById('hintBtn').onclick = toggleHint;
            document.getElementById('explainBtn').onclick = toggleExplanation;
            document.getElementById('solutionBtn').onclick = showSolution;
            document.getElementById('resetBtn').onclick = resetLevel;
            document.getElementById('prevBtn').onclick = () => {
                if (currentLevel > 0) switchLevel(currentLevel - 1);
            };
            document.getElementById('nextBtn').onclick = () => {
                if (currentLevel < levels.length - 1) switchLevel(currentLevel + 1);
            };
            document.getElementById('prevBtn').style.visibility = currentLevel > 0 ? 'visible' : 'hidden';
            document.getElementById('nextBtn').textContent = currentLevel < levels.length - 1
                ? 'Nächstes Level →' : '🏆 Fertig!';

            updateHintButton();
            applyLangToNewElements();
            if (explanationVisible) document.getElementById('levelExplain').classList.add('show');
        }

        function updateHintButton() {
            const btn = document.getElementById('hintBtn');
            const total = levels[currentLevel].hints.length;
            if (hintLevel === 0) {
                btn.innerHTML = '💡 Hinweis <span class="hint-counter">1/' + total + '</span>';
            } else if (hintLevel < total) {
                btn.innerHTML = '💡 Hinweis <span class="hint-counter">' + (hintLevel + 1) + '/' + total + '</span>';
            } else {
                const t = getTranslation('level_hint_close');
                btn.textContent = t || '💡 Hinweise schließen';
            }
        }

        function updatePreview() {
            const code = document.getElementById('codeEditor').value;
            const frame = document.getElementById('previewFrame');
            const fullHtml = '<!DOCTYPE html><html><body style="font-family:sans-serif;padding:15px;">' + code + '</body></html>';
            frame.srcdoc = fullHtml;
        }

        function checkLevel() {
            const code = document.getElementById('codeEditor').value;
            const level = levels[currentLevel];
            const result = document.getElementById('levelResult');

            if (level.check(code)) {
                result.className = 'level-result correct';
                result.textContent = getTranslation('level_correct') || '✅ Richtig! Super gemacht!';
                result.style.display = 'block';
                if (!completedLevels.includes(currentLevel)) {
                    completedLevels.push(currentLevel);
                    saveProgress();
                    renderLevelNav();
                    updateProgress();
                }
            } else {
                result.className = 'level-result wrong';
                result.textContent = getTranslation('level_wrong') || '❌ Noch nicht ganz. Versuch\'s nochmal!';
                result.style.display = 'block';
            }
        }

        function toggleHint() {
            const total = levels[currentLevel].hints.length;
            if (hintLevel >= total) {
                hintLevel = 0;
            } else {
                hintLevel++;
            }
            const hintBox = document.getElementById('levelHint');
            if (hintLevel === 0) {
                hintBox.innerHTML = '';
            }
            renderLevel();
        }

        function toggleExplanation() {
            explanationVisible = !explanationVisible;
            const box = document.getElementById('levelExplain');
            if (explanationVisible) {
                box.innerHTML = '<strong>🤔 Warum?</strong> ' + levels[currentLevel].explanation;
                box.classList.add('show');
            } else {
                box.classList.remove('show');
            }
        }

        function showSolution() {
            solutionVisible = true;
            const editor = document.getElementById('codeEditor');
            editor.value = levels[currentLevel].solution;
            updatePreview();
            document.getElementById('levelResult').style.display = 'none';
        }

        function resetLevel() {
            solutionVisible = false;
            hintLevel = 0;
            explanationVisible = false;
            document.getElementById('levelHint').innerHTML = '';
            document.getElementById('levelExplain').classList.remove('show');
            document.getElementById('levelResult').style.display = 'none';
            document.getElementById('codeEditor').value = '';
            updatePreview();
            renderLevel();
        }

        function updateProgress() {
            const fill = document.getElementById('progressFill');
            const pct = levels.length > 0 ? (completedLevels.length / levels.length) * 100 : 0;
            fill.style.width = pct + '%';
        }

        function getTranslation(key) {
            const lang = localStorage.getItem('selectedLanguage') || 'de';
            return translations && translations[lang] && translations[lang][key];
        }

        function applyLangToNewElements() {
            const lang = localStorage.getItem('selectedLanguage') || 'de';
            const t = translations && translations[lang];
            if (t) {
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (t[key] !== undefined) el.innerHTML = t[key];
                });
            }
        }

        // ===== START =====
        renderLevelNav();
        renderLevel();
        updateProgress();

        const originalSwitch = window.switchLanguage;
        if (originalSwitch) {
            window.switchLanguage = function(lang) {
                originalSwitch(lang);
                renderLevel();
            };
        }
    </script>
</body>
</html>
